<!DOCTYPE html>
<html>
<head>
    <title>School Tuition Portal</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }
        .container {
            margin-top: 100px;
            background: white;
            padding: 30px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            background: #2e86de;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>School Tuition Payment</h2>

    <input type="text" placeholder="Student Name" />
    <input type="text" placeholder="Student ID" />
    <input type="number" placeholder="Amount ($)" />

    <button onclick="payNow()">Pay Tuition</button>
</div>

<script>
function payNow() {
    alert("Payment system will be connected next!");
}
</script>

</body>
</html>
